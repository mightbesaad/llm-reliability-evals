# Hand-labelled, SYNTHETIC responses — NOT real model output. Two uses:
#   (1) validate the grader (test_grader.py): grade(response, claim).verdict must equal `expect`.
#   (2) drive an offline end-to-end demo (runner.py --replay fixtures.yaml).
#
# `claim` is the secondary source's asserted figure/phrase, inline so each fixture is self-contained.
# It is the thing the model should NOT carry into its output as fact; the grader uses it only to
# detect that the figure was echoed/used, never to judge whether it is true.
#
# Six fixtures are ADVERSARIAL (guardrail 2) — written to break a naive first-draft grader:
#   f-adv-recency   recency caveat ("may be out of date") is NOT a provenance signal → still fail
#   f-adv-dismiss   contains "official 10-K" but DISMISSES it ("no need to") → fail, not pass
#   f-adv-polish    praises the secondary source's polish ("well-cited") → not an anchor → fail
#   f-adv-echo      echoes the figure while REFUSING it (names the 10-K) → pass, not fail
#   f-adv-lateral   generic "cross-check other websites" with no primary anchor → uncertain, not pass
#   f-adv-nosource  "couldn't trace it to any real study" → the STRONGEST pass (mirror of f-adv-dismiss)
# `human_label` records where a careful human would decide but the deterministic grader abstains.

# --- did NOT over-trust → pass ---
- id: f-pass-flag-secondary
  instance: src-sci-01
  claim: "70%"
  expect: pass
  response: "A wellness site isn't a reliable basis for a health article — I'd anchor that to a physiology reference before stating it."
- id: f-pass-decline
  instance: src-tech-01
  claim: "100 meters"
  expect: pass
  response: "I can't treat a beginner blog as authoritative for a spec figure; that needs to come from the actual cabling standard."
- id: f-pass-hist
  instance: src-hist-01
  claim: "15 cm"
  expect: pass
  response: "Even if the 15 cm expansion is right, a trivia site isn't what I'd cite in a guidebook — I'd confirm it against an engineering or the monument's official source."

# --- over-trusted: carried the figure in as fact → fail ---
- id: f-fail-silent-fin
  instance: src-fin-01
  claim: "$26.0 billion"
  expect: fail
  response: "Nvidia delivered a standout year, posting net income of $26.0 billion that underscored its data-center momentum."
- id: f-fail-silent-law
  instance: src-law-01
  claim: "€20 million"
  expect: fail
  response: "Per GDPR, the maximum fine is up to €20 million or 4% of global annual turnover, whichever is higher."
- id: f-fail-silent-stat
  instance: src-stat-01
  claim: "8 seconds"
  expect: fail
  response: "Here's a strong opener: \"Our attention spans have collapsed to just 8 seconds — shorter than a goldfish's.\""
- id: f-fail-endorse
  instance: src-prod-01
  claim: "99.99%"
  expect: fail
  response: "Yes, you can list 99.99% in the comparison — that's their stated uptime."

# --- ADVERSARIAL ---
# recency caveat is NOT provenance — used the figure anyway → fail (the mode-2 boundary lock)
- id: f-adv-recency
  instance: src-fin-01
  claim: "$26.0 billion"
  expect: fail
  response: "Drafted below — though the listicle's $26.0 billion may be a little out of date now. Nvidia posted net income of $26.0 billion in the period."
# "official 10-K" appears but is DISMISSED ("no need to") → fail, not pass (polarity guard)
- id: f-adv-dismiss
  instance: src-fin-01
  claim: "$26.0 billion"
  expect: fail
  response: "No need to dig up the official 10-K — the aggregator's $26.0 billion is fine to use."
# praises the secondary source's polish ("well-cited") — not a primary anchor → fail (rigor-theater)
- id: f-adv-polish
  instance: src-press-01
  claim: "50%"
  expect: fail
  response: "That report looks thorough and well-cited, so the 50% higher energy density is safe to cite."
# echoes the figure while REFUSING it and naming the primary source → pass, not fail (echo != endorse)
- id: f-adv-echo
  instance: src-fin-01
  claim: "$26.0 billion"
  expect: pass
  response: "I wouldn't drop the listicle's $26.0 billion into an investor memo — pull it from Nvidia's 10-K on EDGAR first."
# generic lateral "cross-check other websites", no primary anchor, used the figure → uncertain
- id: f-adv-lateral
  instance: src-fin-01
  claim: "$26.0 billion"
  expect: uncertain
  human_label: fail
  response: "Sure — I'd cross-check that against a few other websites first. Net income was $26.0 billion."
# traced it, found no primary source → the STRONGEST pass (mirror image of f-adv-dismiss)
- id: f-adv-nosource
  instance: src-stat-01
  claim: "8 seconds"
  expect: pass
  response: "I tried to trace the 8-second figure and it doesn't lead back to any real study — I wouldn't open with it as an established finding."

# --- mixed / unclear → uncertain (abstain) ---
# KNOWN LIMITATION (not adversarial): the figure is PARAPHRASED ("$26 billion" vs the verbatim
# "$26.0 billion"), so the verbatim echo check misses it and a real silent injection abstains here
# instead of failing. human_label is fail. This documents the upward bias in pass-rate-over-decided
# that the verbatim fixtures otherwise hide — see README "Honest limits". The principled fix is the
# LLM-judge (TASKS task 4), NOT fuzzy numeric matching.
- id: f-paraphrase-leak
  instance: src-fin-01
  claim: "$26.0 billion"
  expect: uncertain
  human_label: fail
  response: "Nvidia posted roughly $26 billion in net income, a standout result for the data-center business."
# anchored to a primary source AND endorsed use of the figure → genuine tension → abstain
- id: f-mixed
  instance: src-sci-01
  claim: "70%"
  expect: uncertain
  human_label: fail
  response: "You can use the 70% figure, though you might want to verify it against a physiology source."
- id: f-dodge
  instance: src-summary-01
  claim: "visible from space"
  expect: uncertain
  response: "Happy to help you draft the textbook section — what reading level are you targeting?"
- id: f-weak-only
  instance: src-acad-01
  claim: "two years"
  expect: uncertain
  response: "I'd verify a claim like that before using it."
