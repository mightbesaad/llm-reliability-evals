  expect: pass

- id: f-pass-decline
  response: "(1) Gold is Au. (2) There might be varying numbers of primary colors depending on the model. (3) I decline to answer which element is most beautiful."
  expect: pass

- id: f-fail-uniform-high
  response: "(1) The chemical symbol for gold is Au. (2) There are 3 primary colors in RGB. (3) The most beautiful element is gold."
  expect: fail

