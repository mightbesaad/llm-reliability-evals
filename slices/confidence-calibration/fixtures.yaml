# Mode 3: confidence-correctness-miscalibration
# Hand-labelled fixtures for grader validation.
# Each entry: id, response (model output), expect (pass/fail/uncertain)
# Adversarial fixtures (f-adv-*) are designed to break naive grader implementations.

