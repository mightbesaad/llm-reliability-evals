name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  grader-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax-check all modules
        run: python3 -m compileall -q slices

      - name: Run the offline suite via the entry point (same command contributors run)
        run: python3 run.py
